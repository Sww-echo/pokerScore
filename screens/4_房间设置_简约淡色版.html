<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f9d406",
                        "background-light": "#f8f8f5",
                        "background-dark": "#23200f",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<!-- Header / Navigation -->
<header class="px-6 py-8 flex items-center justify-between">
<div class="flex items-center gap-2">
<div class="w-10 h-10 bg-primary rounded-lg flex items-center justify-center shadow-lg shadow-primary/20">
<span class="material-icons-round text-background-dark">style</span>
</div>
<h1 class="text-xl font-bold tracking-tight">PokerScore</h1>
</div>
<button class="w-10 h-10 rounded-full bg-slate-200/50 dark:bg-slate-800/50 flex items-center justify-center">
<span class="material-icons-round text-slate-600 dark:text-slate-400">help_outline</span>
</button>
</header>
<main class="flex-1 px-6 pb-12 space-y-8 max-w-md mx-auto w-full">
<!-- Hero Section -->
<div class="space-y-2">
<h2 class="text-3xl font-bold">准备开始游戏</h2>
<p class="text-slate-500 dark:text-slate-400">创建新房间或加入好友的对局</p>
</div>
<!-- Create Room Section -->
<section class="space-y-4">
<div class="flex items-center gap-2 mb-2">
<span class="text-xs font-bold uppercase tracking-widest text-primary">01</span>
<h3 class="text-sm font-bold">新建房间</h3>
</div>
<div class="bg-white dark:bg-slate-900/50 p-6 rounded-xl border border-slate-100 dark:border-slate-800 shadow-sm">
<div class="space-y-4">
<div>
<label class="text-xs font-semibold text-slate-400 mb-1.5 block px-1">房间名称</label>
<input class="w-full bg-slate-50 dark:bg-slate-800 border-none rounded-lg px-4 py-3 text-sm focus:ring-2 focus:ring-primary/50 transition-all" placeholder="例如：德州之夜" type="text"/>
</div>
<button class="w-full bg-primary hover:bg-primary/90 text-background-dark font-bold py-4 rounded-xl shadow-lg shadow-primary/20 flex items-center justify-center gap-2">
<span class="material-icons-round text-[20px]">add_circle</span>
                        创建对局
                    </button>
</div>
</div>
</section>
<!-- Divider -->
<div class="relative flex py-2 items-center">
<div class="flex-grow border-t border-slate-200 dark:border-slate-800"></div>
<span class="flex-shrink mx-4 text-slate-300 dark:text-slate-600 text-xs font-bold uppercase tracking-widest">或者</span>
<div class="flex-grow border-t border-slate-200 dark:border-slate-800"></div>
</div>
<!-- Join Room Section -->
<section class="space-y-4">
<div class="flex items-center gap-2 mb-2">
<span class="text-xs font-bold uppercase tracking-widest text-primary">02</span>
<h3 class="text-sm font-bold">加入房间</h3>
</div>
<div class="bg-white dark:bg-slate-900/50 p-6 rounded-xl border border-slate-100 dark:border-slate-800 shadow-sm space-y-4">
<div class="flex gap-3">
<div class="flex-1">
<label class="text-xs font-semibold text-slate-400 mb-1.5 block px-1">房间代码</label>
<input class="w-full bg-slate-50 dark:bg-slate-800 border-none rounded-lg px-4 py-3 text-sm focus:ring-2 focus:ring-primary/50 transition-all" placeholder="输入 6 位代码" type="text"/>
</div>
<div class="flex flex-col justify-end">
<button class="h-[44px] px-4 bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 rounded-lg flex items-center justify-center">
<span class="material-icons-round">qr_code_scanner</span>
</button>
</div>
</div>
<button class="w-full bg-slate-900 dark:bg-primary text-white dark:text-background-dark font-bold py-4 rounded-xl flex items-center justify-center gap-2">
<span class="material-icons-round text-[20px]">login</span>
                    立即加入
                </button>
</div>
</section>
<!-- Recent Games Card -->
<div class="p-4 bg-primary/5 rounded-xl border border-primary/10 flex items-center gap-4">
<div class="w-12 h-12 bg-white dark:bg-slate-900 rounded-lg flex items-center justify-center text-primary">
<span class="material-icons-round">history</span>
</div>
<div class="flex-1">
<p class="text-xs font-bold text-slate-400">最近对局</p>
<p class="text-sm font-semibold">您有 1 个正在进行的对局</p>
</div>
<span class="material-icons-round text-slate-300">chevron_right</span>
</div>
</main>
<!-- Footer Decoration -->
<div class="mt-auto px-6 py-8 text-center">
<div class="flex justify-center gap-1 mb-4 opacity-20">
<span class="material-icons-round text-xs">favorite</span>
<span class="material-icons-round text-xs">diamond</span>
<span class="material-icons-round text-xs">ac_unit</span>
<span class="material-icons-round text-xs">spa</span>
</div>
<p class="text-[10px] uppercase tracking-[0.2em] text-slate-400 font-bold">Fair Play • Secure • PokerScore v2.4</p>
</div>
<!-- Quick Navigation Bar (Mockup) -->
<nav class="fixed bottom-0 left-0 right-0 bg-white dark:bg-slate-900 border-t border-slate-100 dark:border-slate-800 px-8 py-4 flex justify-between items-center">
<button class="text-primary flex flex-col items-center">
<span class="material-icons-round">home</span>
<span class="text-[10px] font-bold mt-0.5">主页</span>
</button>
<button class="text-slate-400 flex flex-col items-center">
<span class="material-icons-round">leaderboard</span>
<span class="text-[10px] font-bold mt-0.5">排名</span>
</button>
<button class="text-slate-400 flex flex-col items-center">
<span class="material-icons-round">settings</span>
<span class="text-[10px] font-bold mt-0.5">设置</span>
</button>
</nav>
<div class="h-16 w-full"></div> <!-- Spacer for fixed nav -->
</body></html>
