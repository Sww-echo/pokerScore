<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f9d406",
                        "background-light": "#f8f8f5",
                        "background-dark": "#23200f",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<header class="flex items-center justify-between p-4 bg-transparent">
<button class="flex items-center justify-center size-10 rounded-full hover:bg-slate-200/50 dark:hover:bg-slate-700/50 transition-colors">
<span class="material-symbols-outlined text-slate-900 dark:text-slate-100">menu</span>
</button>
<div class="flex items-center gap-2">
<div class="size-8 bg-primary rounded-lg flex items-center justify-center shadow-sm">
<span class="material-symbols-outlined text-slate-900 text-xl font-bold">style</span>
</div>
<h1 class="text-xl font-bold tracking-tight text-slate-900 dark:text-slate-100">PokerScore</h1>
</div>
<button class="flex items-center justify-center size-10 rounded-full hover:bg-slate-200/50 dark:hover:bg-slate-700/50 transition-colors">
<span class="material-symbols-outlined text-slate-900 dark:text-slate-100">notifications</span>
</button>
</header>
<main class="flex-1 flex flex-col items-center justify-center px-6 max-w-md mx-auto w-full">
<div class="w-full mb-12 flex flex-col items-center">
<div class="w-full aspect-video rounded-xl overflow-hidden mb-8 shadow-sm bg-slate-200 dark:bg-slate-800" data-alt="Luxury poker table with gold cards and chips" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAl1Of5TNvUcGPy5cZxdYRsDCmpWBBUsuJqbSmkCQcidTrm98A9siY1tDIa2S2vyymkXkcUw5lScgoONOXzM-tY2MhXnTD20iDPA1kWaREXjrOjQJdOi8Qb_3CwRyWHKQBNOv6r0vPsbnfXRvT7nJqY5HR22POG0VD-dpf50Q7OpJ6e4kbYSJ7RXb-f_0udhLMFYVDPGqp5iMce58KWackpOuGwJkap6BsW2ZQJt0kw8INIBUfkjmjx__6-EzLaWyGzBEIAiWmahfM'); background-size: cover; background-position: center;">
</div>
<h2 class="text-3xl font-bold mb-3 text-slate-900 dark:text-slate-100">PokerScore</h2>
<p class="text-slate-500 dark:text-slate-400 text-center font-medium">用分代替钱，实时记录牌局输赢</p>
</div>
<div class="w-full space-y-4 mb-16">
<button class="w-full h-14 bg-primary text-slate-900 font-bold rounded-xl flex items-center justify-center gap-2 shadow-lg shadow-primary/20 hover:opacity-90 transition-opacity">
<span class="material-symbols-outlined">add_circle</span>
                创建房间
            </button>
<button class="w-full h-14 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 font-bold rounded-xl flex items-center justify-center gap-2 border border-slate-200 dark:border-slate-700 shadow-sm hover:bg-slate-50 dark:hover:bg-slate-750 transition-colors">
<span class="material-symbols-outlined">group_add</span>
                加入房间
            </button>
</div>
<div class="w-full">
<div class="flex items-center gap-4 mb-8">
<div class="h-[1px] flex-1 bg-slate-200 dark:bg-slate-700"></div>
<span class="text-xs uppercase tracking-widest text-slate-400 font-bold">快速登录</span>
<div class="h-[1px] flex-1 bg-slate-200 dark:bg-slate-700"></div>
</div>
<div class="flex justify-center gap-8">
<button class="flex flex-col items-center gap-2 group">
<div class="size-14 rounded-full bg-white dark:bg-slate-800 flex items-center justify-center border border-slate-200 dark:border-slate-700 shadow-sm group-hover:border-primary transition-colors">
<span class="material-symbols-outlined text-[#07C160]">chat_bubble</span>
</div>
<span class="text-xs font-semibold text-slate-500 dark:text-slate-400">微信登录</span>
</button>
<button class="flex flex-col items-center gap-2 group">
<div class="size-14 rounded-full bg-white dark:bg-slate-800 flex items-center justify-center border border-slate-200 dark:border-slate-700 shadow-sm group-hover:border-primary transition-colors">
<span class="material-symbols-outlined text-slate-600 dark:text-slate-300">person</span>
</div>
<span class="text-xs font-semibold text-slate-500 dark:text-slate-400">游客登录</span>
</button>
</div>
</div>
</main>
<footer class="p-8 text-center">
<p class="text-[10px] text-slate-400 font-medium uppercase tracking-[0.2em]">© 2024 PokerScore Premium Experience</p>
</footer>
</body></html>
