请设计一个移动端优先的 H5 产品，名称叫 PokerScore，用于线下打牌时记分。

产品目标：
用户用“分”代替“钱”记录输赢，通过手动给其他牌友划转分值来记账。牌局结束后，系统展示最终结算页，显示每个人的净分和建议的最少转账路径，供线下实际转账参考。

平台要求：
这是移动端 H5，不是桌面网页，不是后台管理系统。
主要使用场景是手机浏览器和微信内打开。
请按手机界面设计，单栏布局，适合单手操作，支持底部安全区，带底部固定操作栏。

核心功能：
- 支持微信登录，也支持游客进入
- 在普通浏览器中进入时，允许用户先输入昵称
- 支持创建房间
- 支持输入房间码进入房间
- 支持扫码进入房间
- 房间页展示所有牌友头像、昵称、当前分数
- 点击牌友头像，弹出“转分”弹窗
- 支持单人转分，也支持多人转分
- 多人转分时，每个收款人单独输入金额
- 房间内实时显示转分流水
- 分数允许负数
- 初始分数为 0
- 房间总分始终保持为 0
- 任意成员都可以点击结算
- 结算页显示最终净分和建议转账路径
- 结算后允许重新开启房间继续记分

请设计以下页面：
1. 首页
2. 昵称/登录弹窗
3. 创建房间 / 加入房间页
4. 房间页
5. 转分弹窗
6. 结算页

首页要求：
- 展示产品名称 PokerScore
- 一句核心说明：用分代替钱，实时记录牌局输赢
- 主按钮：创建房间、加入房间
- 提供游客进入和微信登录入口
- 提供昵称输入入口
- 整体是移动端 H5 首页风格，简洁、有氛围感

创建/加入房间页要求：
- 创建房间：房间名称输入框、创建按钮
- 加入房间：房间码输入框、加入按钮、扫码入口
- 按钮尺寸适合手指点击
- 输入区域简洁，不复杂

房间页要求：
- 顶部显示房间名称、房间码、在线人数、分享或复制入口
- 中间展示牌友列表，每个人显示头像、昵称、当前分数
- 点击头像可发起单人转分
- 页面中要有多人转分入口
- 页面中要有结算入口
- 页面下方展示实时流水，格式类似“张三 转给 李四 20分”
- 底部有固定操作栏，适合移动端操作
- 页面气质像牌桌记分工具，不要像财务系统

转分弹窗要求：
- 使用移动端弹窗样式
- 清楚展示当前付款方
- 可选择一个或多个收款方
- 每个收款方单独输入金额
- 展示本次总转出分值
- 有明确确认按钮
- 操作简单直接，避免误触

结算页要求：
- 展示所有成员最终净分
- 有一定排名感，但不要太游戏化
- 展示建议的最少转账路径
- 例如 A +100，B -60，C -40，则展示：B 转 A 60，C 转 A 40
- 页面底部有“重新开启房间”和“返回房间”按钮
- 用户可以直接拿着这个页面做线下转账参考

视觉风格要求：
- 移动端 H5 风格
- 大圆角卡片
- 深墨绿牌桌氛围
- 金色点缀
- 米白文字
- 头像和分数是视觉重点
- 正分高亮，负分明显区分
- 可有轻微桌布纹理、柔和渐变、牌桌氛围
- 不要做成银行支付产品
- 不要做成后台管理系统

交互要求：
- 所有主要操作适合单手完成
- 底部固定操作栏
- 支持安全区适配
- 转分用底部抽屉完成
- 结算按钮有明确确认感
- 信息层级清晰，方便多人围桌时快速查看

请输出完整的移动端 H5 UI 设计，重点突出：
牌友头像、当前分数、底部操作栏、转分弹窗、结算结果。
